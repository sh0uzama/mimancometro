<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mimancometro</title>
    <link rel="stylesheet" href="main.css" />
    <link rel="icon" href="/mimancometro.png" />
  </head>
  <body>
    <h1>Mimancometro per Lory</h1>
    <p class="subtitle" id="date"></p>

    <p class="explanation">Questo misuratore indica quanto mi manchi oggi.</p>

    <p class="explanation">
      Su una scala da 0 a 10, oggi mi manchi
      <strong><span id="num">-</span></strong
      >.
    </p>

    <div class="scale">
      <span>0</span>
      <span>5</span>
      <span>10</span>
    </div>
    <div class="track">
      <div class="fill" id="fill">
        <span class="value-label" id="val"></span>
      </div>
    </div>

    <p class="special-msg" id="msg"></p>

    <script type="module" src="special-dates.js"></script>
    <script type="module" src="main.js"></script>
  </body>
</html>
